backend:
  name: github
  repo: sleakops/docs
  branch: develop
  base_url: https://sveltia-cms-auth.matias-izquierdo.workers.dev

media_folder: static/img
public_folder: /img

# i18n Configuration - Multiple Folders Structure
i18n:
  structure: multiple_folders
  locales: [en, es]
  default_locale: en

collections:
  # ============================================
  # 📖 DOCUMENTATION
  # ============================================

  # Documentation Root - archivos directamente en content/docs/<locale>/
  - name: docs-root
    label: "Documentation Root"
    icon: home
    folder: content/docs
    path: "{{slug}}"
    create: true
    extension: mdx
    format: frontmatter
    i18n: true
    identifier_field: title
    index_file:
      name: index
      label: "Index"
    fields:
      - { name: title, label: Title, widget: string, i18n: true }
      - {
          name: sidebar_label,
          label: Sidebar Label,
          widget: string,
          required: false,
          i18n: true,
        }
      - {
          name: sidebar_position,
          label: Sidebar Position,
          widget: number,
          required: false,
          i18n: duplicate,
        }
      - { name: body, label: Body, widget: markdown, i18n: true }

