  # ============================================
  # 📚 TUTORIALS
  # ============================================

  - name: tutorials
    label: "Tutorials"
    icon: menu_book
    folder: content/tutorials
    path: "{{slug}}"
    media_folder: "/static/img/tutorials/{{slug}}"
    public_folder: "/img/tutorials/{{slug}}"
    create: true
    extension: mdx
    format: frontmatter
    i18n: true
    identifier_field: title
    fields:
      - { name: title, label: Title, widget: string, i18n: true }
      - {
          name: sidebar_label,
          label: Sidebar Label,
          widget: string,
          required: false,
          i18n: true,
        }
      - {
          name: sidebar_position,
          label: Sidebar Position,
          widget: number,
          required: false,
          value_type: int,
          min: 0,
          i18n: duplicate,
        }
      - {
          name: description,
          label: Description,
          widget: text,
          required: true,
          i18n: true,
        }
      - name: tags
        label: Tags
        widget: select
        multiple: true
        options:
          - { label: "⭐ Featured", value: "featured" }
          - { label: "Getting Started", value: "getting-started" }
          - { label: "AWS", value: "aws" }
          - { label: "Kubernetes", value: "kubernetes" }
          - { label: "Database", value: "database" }
          - { label: "Security", value: "security" }
          - { label: "Networking", value: "networking" }
          - { label: "Deployment", value: "deployment" }
          - { label: "Troubleshooting", value: "troubleshooting" }
        required: false
        i18n: duplicate
      - {
          name: image,
          label: Preview Image,
          widget: image,
          required: false,
          i18n: duplicate,
        }
      - { name: body, label: Body, widget: markdown, i18n: true }

  # ============================================
  # 📝 CHANGELOG
  # ============================================

  - name: changelog
    label: "Changelog"
    icon: history
    folder: content/changelog
    path: "{{slug}}"
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{title | slug}}"
    i18n: true
    identifier_field: title
    fields:
      - { name: title, label: Title, widget: string, i18n: true }
      - name: authors
        label: Authors
        widget: list
        required: false
        i18n: duplicate
        fields:
          - { name: name, label: Name, widget: string }
      - name: tags
        label: Tags
        widget: select
        multiple: true
        options:
          - { label: "Release", value: "release" }
          - { label: "Major", value: "major" }
          - { label: "Minor", value: "minor" }
          - { label: "Patch", value: "patch" }
          - { label: "Feature", value: "feature" }
          - { label: "Bugfix", value: "bugfix" }
        required: false
        i18n: duplicate
      - { name: body, label: Body, widget: markdown, i18n: true }
